<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Em Manutenção</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --cream: #f5f0e8;
  --dark: #0a0a0a;
  --muted: rgba(245,240,232,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background-color: var(--dark);
  color: var(--cream);
  font-family: 'Montserrat', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 20px;
  position: relative;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.bg-vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
  z-index: 0;
}

.bg-orb {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(600px, 90vw);
  height: min(600px, 90vw);
  background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: pulse-orb 6s ease-in-out infinite;
}
@keyframes pulse-orb {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.6; }
}

.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  animation: enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
}
@keyframes enter {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.label-top {
  font-family: 'Montserrat', sans-serif;
  font-weight: 200;
  font-size: clamp(9px, 2vw, 11px);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 36px;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.8s forwards;
}
.label-top::before, .label-top::after {
  content: '';
  display: block;
  width: clamp(32px, 8vw, 60px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.label-top::after {
  background: linear-gradient(90deg, var(--gold), transparent);
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(3.2rem, 12vw, 7.5rem);
  line-height: 0.9;
  letter-spacing: -0.02em;
  text-align: center;
  color: var(--cream);
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeIn 0.8s ease 1s forwards;
}
h1 em {
  font-style: italic;
  color: var(--gold-light);
}

.rule {
  width: clamp(48px, 15vw, 80px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 28px auto;
  opacity: 0;
  animation: fadeIn 0.8s ease 1.2s forwards;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
  letter-spacing: 0.02em;
  max-width: 480px;
  margin-bottom: 52px;
  padding: 0 8px;
  opacity: 0;
  animation: fadeIn 0.8s ease 1.35s forwards;
}

.progress-wrap {
  width: 100%;
  max-width: 320px;
  opacity: 0;
  animation: fadeIn 0.8s ease 1.5s forwards;
  margin-bottom: 48px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.progress-track {
  width: 100%;
  height: 1px;
  background: rgba(245,240,232,0.1);
  position: relative;
  overflow: visible;
}
.progress-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  animation: fill-progress 4s cubic-bezier(0.4, 0, 0.2, 1) 2s forwards;
}
@keyframes fill-progress {
  0%   { width: 0%; }
  40%  { width: 55%; }
  70%  { width: 72%; }
  100% { width: 78%; }
}
.progress-dot {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold-light);
  left: 78%;
  opacity: 0;
  box-shadow: 0 0 8px 2px rgba(201,168,76,0.6);
  animation: dot-appear 0.4s ease 6.1s forwards;
}
@keyframes dot-appear { to { opacity: 1; } }

.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 4vw, 40px);
  opacity: 0;
  animation: fadeIn 0.8s ease 1.8s forwards;
  flex-wrap: wrap;
  padding: 0 8px;
}
.bottom-item {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(8px, 2vw, 10px);
  font-weight: 200;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.dot-sep {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.5;
  flex-shrink: 0;
}

.corner {
  position: fixed;
  width: 36px;
  height: 36px;
  opacity: 0.25;
  pointer-events: none;
  z-index: 1;
}
.corner svg { width: 100%; height: 100%; }
.corner--tl { top: 20px; left: 20px; }
.corner--tr { top: 20px; right: 20px; transform: scaleX(-1); }
.corner--bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
.corner--br { bottom: 20px; right: 20px; transform: scale(-1); }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@media (max-width: 400px) {
  .corner { display: none; }
  .dot-sep { display: none; }
  .bottom-bar { gap: 10px; flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-vignette"></div>
<div class="bg-orb"></div>

<div class="corner corner--tl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    <circle cx="2" cy="2" r="2" fill="#c9a84c"/>
  </svg>
</div>
<div class="corner corner--tr">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    <circle cx="2" cy="2" r="2" fill="#c9a84c"/>
  </svg>
</div>
<div class="corner corner--bl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    <circle cx="2" cy="2" r="2" fill="#c9a84c"/>
  </svg>
</div>
<div class="corner corner--br">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 38 L2 2 L38 2" stroke="#c9a84c" stroke-width="1" fill="none"/>
    <circle cx="2" cy="2" r="2" fill="#c9a84c"/>
  </svg>
</div>

<div class="wrapper">
  <div class="label-top">Em manutenção</div>
  <h1>Voltamos<br><em>em breve</em></h1>
  <div class="rule"></div>
  <p class="subtitle">
    Estamos aprimorando nossa experiência.<br>
  </p>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progresso</span>
      <span>78%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
      <div class="progress-dot"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="bottom-item">Obrigado pela paciência</span>
    <span class="dot-sep"></span>
    <span class="bottom-item">Retorno em breve</span>
    <span class="dot-sep"></span>
    <span class="bottom-item">© 2026</span>
  </div>
</div>

</body>
</html>
